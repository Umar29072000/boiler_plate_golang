version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: fiber_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fiber_boilerplate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache & Rate Limiter
  redis:
    image: redis:7-alpine
    container_name: fiber_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Golang API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fiber_api
    ports:
      - "3000:3000"
    environment:
      APP_NAME: Fiber Boilerplate
      APP_ENV: production
      APP_PORT: 3000
      APP_URL: http://localhost:3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: fiber_boilerplate
      DB_SSL_MODE: disable
      JWT_SECRET: your-super-secret-jwt-key-change-this
      JWT_EXPIRATION: 168h
      CORS_ALLOWED_ORIGINS: "*"
      EMAIL_FROM: noreply@fiberboilerplate.com
      EMAIL_HOST: smtp.ethereal.email
      EMAIL_PORT: 587
      EMAIL_USERNAME: your-ethereal-username
      EMAIL_PASSWORD: your-ethereal-password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      RATE_LIMIT_MAX: 100
      RATE_LIMIT_DURATION: 15m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
