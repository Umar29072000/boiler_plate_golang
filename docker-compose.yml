version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: fiber_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fiber_boilerplate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Golang API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fiber_api
    ports:
      - "3000:3000"
    environment:
      APP_NAME: Fiber Boilerplate
      APP_ENV: production
      APP_PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: fiber_boilerplate
      DB_SSL_MODE: disable
      JWT_SECRET: your-super-secret-jwt-key-change-this
      JWT_EXPIRATION: 24h
      CORS_ALLOWED_ORIGINS: "*"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
